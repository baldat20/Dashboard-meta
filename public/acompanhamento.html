<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Acompanhamento – Painel de Gestão</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --blue: #42a7f5;
  --blue-dark: #0e76d1;
  --nivel-super-bg: #a129d9;  --nivel-super-txt: #fff;
  --nivel-defin-bg: #42f554;  --nivel-defin-txt: #064d11;
  --nivel-toler-bg: #dbd951;  --nivel-toler-txt: #222;
  --nivel-nao-bg:   #db4c42;  --nivel-nao-txt:   #fff;
  --nivel-vazio-bg: #ddd;     --nivel-vazio-txt: #666;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Montserrat', system-ui, Arial;
  background: linear-gradient(135deg, #428bfc 0%, #b9e2ff 100%);
  min-height: 100vh;
}

header.topbar {
  background: #000; color: #fff;
  padding: 22px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
header.topbar h1 { margin: 0; font-size: 26px; font-weight: 800; }
.top-actions { display: flex; gap: 12px; align-items: center; }
.btn-outline {
  background: transparent; border: 2px solid white; color: white;
  padding: 9px 16px; border-radius: 8px; font-weight: 700;
  cursor: pointer; font-family: inherit; font-size: 14px;
}
.subbar { height: 8px; background: var(--blue); }
.container { max-width: 1280px; margin: 24px auto; padding: 0 18px; }

.tabs { display: flex; gap: 16px; margin-bottom: 20px; }
.tab-btn {
  background: white; border-radius: 34px; padding: 12px 32px;
  font-size: 18px; font-weight: 700; border: 2px solid rgba(0,0,0,0.06);
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

#filtroSup {
  display: none; margin-bottom: 18px;
  align-items: center; gap: 12px; flex-wrap: wrap;
}
#filtroSup label { font-weight: 700; color: #fff; font-size: 15px; }
#filtroSup select {
  padding: 10px 14px; border-radius: 10px; border: none;
  font-family: inherit; font-weight: 600; font-size: 15px;
  cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

.legend {
  display: none; gap: 14px; flex-wrap: wrap;
  margin-bottom: 20px; align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: #fff; }
.legend-dot  { width: 12px; height: 12px; border-radius: 50%; }

#gridCards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.colab-card {
  background: white; border-radius: 16px; padding: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  border-left: 6px solid #ccc;
  transition: transform .15s, box-shadow .15s;
}
.colab-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.13); }
.colab-card.melhora  { border-left-color: #42f554; background: #f6fff7; }
.colab-card.estavel  { border-left-color: var(--blue); }
.colab-card.instavel { border-left-color: #dbd951; background: #fffdf0; }
.colab-card.piora    { border-left-color: #db4c42; background: #fff8f8; }
.colab-card.neutro, .colab-card.sem_dados { border-left-color: #ccc; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 8px; }
.card-nome  { font-weight: 800; font-size: 14px; line-height: 1.3; flex: 1; }
.card-cargo { font-size: 11px; font-weight: 700; background: #f0f4ff; color: #555; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }

.badge-desvio {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; margin-bottom: 16px;
}
.badge-desvio.melhora  { background: #e7ffe9; color: #1a7a2e; }
.badge-desvio.estavel  { background: #e8f4ff; color: #0e5fa3; }
.badge-desvio.instavel { background: #fffbe6; color: #7a6400; }
.badge-desvio.piora    { background: #ffe8e8; color: #9b1c1c; }
.badge-desvio.neutro   { background: #f0f0f0; color: #666; }

.timeline { display: flex; align-items: flex-start; }
.tl-step {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; position: relative;
}
.tl-step::after {
  content: ''; position: absolute; top: 17px; right: -50%;
  width: 100%; height: 3px; background: #e0eaf5; z-index: 0;
}
.tl-step:last-child::after { display: none; }
.tl-dot {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; z-index: 1; position: relative; text-align: center;
}
.tl-dot.atual { box-shadow: 0 0 0 3px var(--blue-dark); }
.tl-label { font-size: 10px; font-weight: 700; color: #666; margin-top: 5px; text-align: center; }
.tl-mes   { font-size: 9px; color: #aaa; font-weight: 600; margin-top: 2px; }

.dot-super { background: var(--nivel-super-bg); color: var(--nivel-super-txt); }
.dot-defin { background: var(--nivel-defin-bg); color: var(--nivel-defin-txt); }
.dot-toler { background: var(--nivel-toler-bg); color: var(--nivel-toler-txt); }
.dot-nao   { background: var(--nivel-nao-bg);   color: var(--nivel-nao-txt);   }
.dot-vazio { background: var(--nivel-vazio-bg); color: var(--nivel-vazio-txt); }

#statusMsg { text-align: center; color: white; font-size: 18px; font-weight: 700; padding: 60px 0; }

.floating-sair {
  position: fixed; bottom: 22px; left: 22px;
  background: white; border: 3px solid black;
  padding: 12px 22px; border-radius: 10px;
  font-weight: 800; cursor: pointer;
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  font-family: inherit;
}
</style>
</head>
<body>

<header class="topbar">
  <h1>📊 Acompanhamento de Metas</h1>
  <div class="top-actions">
    <button class="btn-outline" onclick="window.location.href='gestao.html'">⬅ Voltar ao Painel</button>
    <div id="supNome" style="color:#fff; font-weight:700; font-size:15px;"></div>
  </div>
</header>
<div class="subbar"></div>

<div class="container">

  <div id="filtroSup">
    <label>Supervisão:</label>
    <select id="selectSup" onchange="filtrarSupervisao()">
      <option value="">Todas</option>
    </select>
  </div>

  <div class="tabs" id="tabsRow" style="display:none;">
    <button class="tab-btn active" id="tabAnal" onclick="mudarTab('analistas')">Analistas</button>
    <button class="tab-btn"        id="tabAux"  onclick="mudarTab('auxiliares')">Auxiliares</button>
  </div>

  <div class="legend" id="legenda">
    <span class="legend-item"><span class="legend-dot" style="background:#42f554;"></span> Melhora</span>
    <span class="legend-item"><span class="legend-dot" style="background:#42a7f5;"></span> Estável</span>
    <span class="legend-item"><span class="legend-dot" style="background:#dbd951;"></span> Instável</span>
    <span class="legend-item"><span class="legend-dot" style="background:#db4c42;"></span> Piora / Desvio</span>
    <span style="color:rgba(255,255,255,.6); font-size:12px; font-weight:600;">— Borda e fundo do card indicam tendência. Piora e instável aparecem primeiro.</span>
  </div>

  <div id="statusMsg">Carregando dados...</div>
  <div id="gridCards"></div>
</div>

<button class="floating-sair" onclick="window.location.href='gestao.html'">SAIR</button>

<script>
function normalize(str) {
  return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ").trim().toLowerCase();
}

let CARGO_USUARIO   = "";
let DADOS_COMPLETOS = null;
let TAB_ATUAL       = "analistas";
let SUP_SELECIONADA = "";

window.addEventListener("DOMContentLoaded", () => {
  // ✅ sessionStorage (gravado pelo gestao.js) com fallback para URL
  const urlP = new URLSearchParams(window.location.search);
  CARGO_USUARIO = sessionStorage.getItem("cargo") || urlP.get("cargo") || "";
  const nomeUsuario = sessionStorage.getItem("nome") || urlP.get("nome") || "";

  if (!CARGO_USUARIO) { window.location.href = "index.html"; return; }

  document.getElementById("supNome").textContent = nomeUsuario;
  carregarDados();
});

async function carregarDados() {
  setStatus("Carregando dados...");
  try {
    const resp = await fetch("/api/acompanhamento?cargo=" + encodeURIComponent(CARGO_USUARIO));
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      setStatus("Erro: " + (err.erro || resp.status));
      return;
    }
    DADOS_COMPLETOS = await resp.json();
    inicializarUI();
  } catch (e) {
    setStatus("Erro de conexão: " + e.message);
  }
}

function inicializarUI() {
  const isCoord = normalize(CARGO_USUARIO) === normalize("Leticia Caroline Da Silva");
  document.getElementById("tabsRow").style.display = "flex";
  document.getElementById("legenda").style.display = "flex";
  setStatus("");

  if (isCoord && DADOS_COMPLETOS.supervisores) {
    const select = document.getElementById("selectSup");
    Object.keys(DADOS_COMPLETOS.supervisores).forEach(s => {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      select.appendChild(opt);
    });
    document.getElementById("filtroSup").style.display = "flex";
  }
  renderizarCards();
}

function mudarTab(tab) {
  TAB_ATUAL = tab;
  document.getElementById("tabAnal").classList.toggle("active", tab === "analistas");
  document.getElementById("tabAux").classList.toggle("active",  tab === "auxiliares");
  renderizarCards();
}

function filtrarSupervisao() {
  SUP_SELECIONADA = document.getElementById("selectSup").value;
  renderizarCards();
}

function renderizarCards() {
  const grid = document.getElementById("gridCards");
  grid.innerHTML = "";
  let colaboradores = [];
  const isCoord = normalize(CARGO_USUARIO) === normalize("Leticia Caroline Da Silva");

  if (isCoord && DADOS_COMPLETOS?.supervisores) {
    const sups = DADOS_COMPLETOS.supervisores;
    const keys = SUP_SELECIONADA ? [SUP_SELECIONADA] : Object.keys(sups);
    keys.forEach(sup => {
      (sups[sup]?.[TAB_ATUAL] || []).forEach(c => colaboradores.push({ ...c, _supervisao: sup }));
    });
  } else {
    (DADOS_COMPLETOS?.[TAB_ATUAL] || []).forEach(c => {
      colaboradores.push({ ...c, _supervisao: DADOS_COMPLETOS?.supervisao || "" });
    });
  }

  if (!colaboradores.length) {
    grid.innerHTML = '<p style="color:white;font-weight:700;font-size:16px;padding:40px 0;">Nenhum colaborador encontrado.</p>';
    return;
  }

  const ordemTend = { piora: 0, instavel: 1, neutro: 2, sem_dados: 3, estavel: 4, melhora: 5 };
  colaboradores.sort((a, b) => (ordemTend[a.tendencia] ?? 3) - (ordemTend[b.tendencia] ?? 3));
  colaboradores.forEach(c => grid.appendChild(criarCard(c)));
}

function criarCard(c) {
  const div = document.createElement("div");
  div.className = `colab-card ${c.tendencia || "neutro"}`;

  const h  = c.historico || {};
  const badges = {
    melhora:  { icon: "📈", text: "Em Melhora",     cls: "melhora"  },
    estavel:  { icon: "➡️",  text: "Estável",         cls: "estavel"  },
    instavel: { icon: "⚠️", text: "Instável",        cls: "instavel" },
    piora:    { icon: "📉", text: "Atenção: Desvio", cls: "piora"    },
    neutro:   { icon: "—",  text: "Sem histórico",   cls: "neutro"   },
    sem_dados:{ icon: "—",  text: "Sem dados",       cls: "neutro"   }
  };
  const bi = badges[c.tendencia] || badges.neutro;

  const hoje = new Date();
  const nomeMes = off => {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() + off, 1);
    return d.toLocaleString("pt-BR", { month: "short" }).replace(".", "").toUpperCase();
  };

  div.innerHTML = `
    <div class="card-header">
      <div class="card-nome">${c.nome}</div>
      <div class="card-cargo">${TAB_ATUAL === "analistas" ? "Analista" : "Auxiliar"}</div>
    </div>
    <div class="badge-desvio ${bi.cls}">${bi.icon} ${bi.text}</div>
    <div class="timeline">
      ${step(h.m2 || "", nomeMes(-2))}
      ${step(h.m1 || "", nomeMes(-1))}
      ${step(h.atual || "", nomeMes(0), true)}
    </div>
  `;
  return div;
}

function step(nivel, mes, isAtual = false) {
  const cls   = dotClass(nivel);
  const label = nivel ? abrev(nivel) : "–";
  const atual = isAtual ? " atual" : "";
  return `
    <div class="tl-step">
      <div class="tl-dot ${cls}${atual}" title="${nivel || 'Sem dado'}">${label}</div>
      <div class="tl-label">${nivel ? nivelShort(nivel) : "—"}</div>
      <div class="tl-mes">${mes}</div>
    </div>
  `;
}

function dotClass(n) {
  if (!n) return "dot-vazio";
  const u = n.toUpperCase();
  if (u.includes("SUPER"))                    return "dot-super";
  if (u.includes("DEFIN"))                    return "dot-defin";
  if (u.includes("TOLER"))                    return "dot-toler";
  if (u.includes("NÃO") || u.includes("NAO")) return "dot-nao";
  return "dot-vazio";
}
function abrev(n) {
  if (!n) return "–";
  const u = n.toUpperCase();
  if (u.includes("SUPER"))                    return "SUP";
  if (u.includes("DEFIN"))                    return "DEF";
  if (u.includes("TOLER"))                    return "TOL";
  if (u.includes("NÃO") || u.includes("NAO")) return "NÃO";
  return "–";
}
function nivelShort(n) {
  if (!n) return "–";
  const u = n.toUpperCase();
  if (u.includes("SUPER"))                    return "Superação";
  if (u.includes("DEFIN"))                    return "Definida";
  if (u.includes("TOLER"))                    return "Tolerável";
  if (u.includes("NÃO") || u.includes("NAO")) return "Não Atingiu";
  return n;
}
function setStatus(msg) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}
</script>
</body>
</html>

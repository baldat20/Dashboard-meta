<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Acompanhamento – Painel de Gestão</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --blue: #42a7f5;
  --blue-dark: #0e76d1;
  --bg-grad: linear-gradient(135deg, #428bfc 0%, #b9e2ff 100%);
  --card: #fff;
  --shadow: 0 6px 20px rgba(0,0,0,0.08);

  --nivel-super-bg: #a129d9;
  --nivel-super-txt: #fff;
  --nivel-defin-bg: #42f554;
  --nivel-defin-txt: #064d11;
  --nivel-toler-bg: #dbd951;
  --nivel-toler-txt: #222;
  --nivel-nao-bg: #db4c42;
  --nivel-nao-txt: #fff;
  --nivel-vazio-bg: #ccc;
  --nivel-vazio-txt: #555;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', system-ui, Arial;
  background: var(--bg-grad);
  min-height: 100vh;
}

/* ── TOPBAR ── */
header.topbar {
  background: #000;
  color: #fff;
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header.topbar h1 { margin: 0; font-size: 28px; font-weight: 800; }
.top-actions { display: flex; gap: 12px; align-items: center; }
.btn {
  background: var(--blue);
  border: none;
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
}
.btn-dark { background: #1f1f1f; }
.btn-outline {
  background: transparent;
  border: 2px solid white;
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
}

.subbar { height: 8px; background: var(--blue); }

/* ── CONTAINER ── */
.container { max-width: 1280px; margin: 24px auto; padding: 0 18px; }

/* ── TABS CARGO ── */
.tabs {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
}
.tab-btn {
  background: white;
  border-radius: 34px;
  padding: 12px 32px;
  font-size: 18px;
  font-weight: 700;
  border: 2px solid rgba(0,0,0,0.06);
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

/* ── FILTRO SUPERVISÃO (coord) ── */
#filtroSup {
  display: none;
  margin-bottom: 20px;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
#filtroSup label { font-weight: 700; color: #fff; font-size: 15px; }
#filtroSup select {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

/* ── LEGENDA ── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}
.legend-sep { color: rgba(255,255,255,0.5); font-size: 18px; }

/* ── GRID DE CARDS ── */
#gridCards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}

/* ── CARD COLABORADOR ── */
.colab-card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: var(--shadow);
  border-left: 6px solid transparent;
  transition: transform .15s, box-shadow .15s;
  position: relative;
  overflow: hidden;
}
.colab-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.13); }

/* cores da borda por tendência */
.colab-card.melhora  { border-left-color: #42f554; }
.colab-card.estavel  { border-left-color: var(--blue); }
.colab-card.instavel { border-left-color: #dbd951; }
.colab-card.piora    { border-left-color: #db4c42; }
.colab-card.neutro   { border-left-color: #ccc; }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
  gap: 10px;
}
.card-nome {
  font-weight: 800;
  font-size: 15px;
  line-height: 1.3;
  flex: 1;
}
.card-cargo {
  font-size: 11px;
  font-weight: 700;
  background: #f0f4ff;
  color: #555;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
}

/* Badge de desvio */
.badge-desvio {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: .3px;
}
.badge-desvio.melhora  { background: #e7ffe9; color: #1a7a2e; }
.badge-desvio.estavel  { background: #e8f4ff; color: #0e5fa3; }
.badge-desvio.instavel { background: #fffbe6; color: #7a6400; }
.badge-desvio.piora    { background: #ffe8e8; color: #9b1c1c; }
.badge-desvio.neutro   { background: #f0f0f0; color: #666; }

/* Timeline */
.timeline {
  display: flex;
  align-items: center;
  gap: 0;
  margin-top: 4px;
}
.tl-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.tl-step::after {
  content: '';
  position: absolute;
  top: 18px;
  right: -50%;
  width: 100%;
  height: 3px;
  background: #e0eaf5;
  z-index: 0;
}
.tl-step:last-child::after { display: none; }

.tl-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
  z-index: 1;
  position: relative;
  letter-spacing: -.3px;
  text-align: center;
  line-height: 1.1;
}
.tl-label {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  margin-top: 6px;
}
.tl-mes {
  font-size: 10px;
  color: #aaa;
  font-weight: 600;
  margin-top: 2px;
}

/* Cores dos dots por nível */
.dot-super { background: var(--nivel-super-bg); color: var(--nivel-super-txt); }
.dot-defin { background: var(--nivel-defin-bg); color: var(--nivel-defin-txt); }
.dot-toler { background: var(--nivel-toler-bg); color: var(--nivel-toler-txt); }
.dot-nao   { background: var(--nivel-nao-bg);   color: var(--nivel-nao-txt);   }
.dot-vazio { background: var(--nivel-vazio-bg); color: var(--nivel-vazio-txt); }

/* highlight fundo card quando tem piora ou instavel */
.colab-card.piora    { background: #fff8f8; }
.colab-card.instavel { background: #fffdf0; }

/* Estado loading/vazio */
#statusMsg {
  text-align: center;
  color: white;
  font-size: 18px;
  font-weight: 700;
  padding: 60px 0;
}

/* Botão sair */
.floating-sair {
  position: fixed;
  bottom: 22px;
  left: 22px;
  background: white;
  border: 3px solid black;
  padding: 12px 22px;
  border-radius: 10px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  font-family: inherit;
}

/* Seta de tendência */
.seta { font-size: 16px; }
</style>
</head>
<body>

<header class="topbar">
  <h1>📊 Acompanhamento de Metas</h1>
  <div class="top-actions">
    <button class="btn-outline" onclick="window.location.href='gestao.html'">⬅ Voltar ao Painel</button>
    <div id="supNome" style="color:#fff; font-weight:700; font-size:15px;"></div>
  </div>
</header>

<div class="subbar"></div>

<div class="container">

  <!-- Filtro supervisão (só coord) -->
  <div id="filtroSup">
    <label>Supervisão:</label>
    <select id="selectSup" onchange="filtrarSupervisao()">
      <option value="">Todas</option>
    </select>
  </div>

  <!-- Tabs Analista / Auxiliar -->
  <div class="tabs" id="tabsRow" style="display:none;">
    <button class="tab-btn active" id="tabAnal" onclick="mudarTab('analistas')">Analistas</button>
    <button class="tab-btn" id="tabAux" onclick="mudarTab('auxiliares')">Auxiliares</button>
  </div>

  <!-- Legenda -->
  <div class="legend" id="legenda" style="display:none;">
    <span class="legend-item"><span class="legend-dot" style="background:#42f554;"></span> Melhora</span>
    <span class="legend-item"><span class="legend-dot" style="background:#42a7f5;"></span> Estável</span>
    <span class="legend-item"><span class="legend-dot" style="background:#dbd951;"></span> Instável</span>
    <span class="legend-item"><span class="legend-dot" style="background:#db4c42;"></span> Piora</span>
    <span class="legend-sep">|</span>
    <span class="legend-item" style="font-size:12px; opacity:.85;">Borda e fundo do card indicam tendência do colaborador</span>
  </div>

  <!-- Status / loading -->
  <div id="statusMsg">Carregando dados...</div>

  <!-- Grid de cards -->
  <div id="gridCards"></div>

</div>

<button class="floating-sair" onclick="window.location.href='gestao.html'">SAIR</button>

<script>
// ─── Estado ───────────────────────────────────────────────
let CARGO_USUARIO  = "";
let DADOS_COMPLETOS = null; // { supervisores: {...} } ou { supervisao, analistas, auxiliares }
let TAB_ATUAL = "analistas";
let SUP_SELECIONADA = "";

// ─── Inicialização ────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  CARGO_USUARIO = sessionStorage.getItem("cargo") || localStorage.getItem("cargo") || "";
  const nome    = sessionStorage.getItem("nome")  || localStorage.getItem("nome")  || "";

  document.getElementById("supNome").textContent = nome;

  if (!CARGO_USUARIO) {
    window.location.href = "index.html";
    return;
  }

  carregarDados();
});

// ─── Fetch ────────────────────────────────────────────────
async function carregarDados() {
  setStatus("Carregando dados...");
  try {
    const params = new URLSearchParams({ cargo: CARGO_USUARIO });
    const resp = await fetch("/api/acompanhamento?" + params.toString());
    if (!resp.ok) {
      const err = await resp.json();
      setStatus("Erro: " + (err.erro || resp.status));
      return;
    }
    DADOS_COMPLETOS = await resp.json();
    inicializarUI();
  } catch (e) {
    setStatus("Erro de conexão: " + e.message);
  }
}

// ─── Monta UI após dados carregados ───────────────────────
function inicializarUI() {
  const isCoord = CARGO_USUARIO === "Leticia Caroline Da Silva";

  document.getElementById("tabsRow").style.display = "flex";
  document.getElementById("legenda").style.display  = "flex";
  setStatus("");

  if (isCoord && DADOS_COMPLETOS.supervisores) {
    // Popula select de supervisão
    const select = document.getElementById("selectSup");
    const sups = Object.keys(DADOS_COMPLETOS.supervisores);
    sups.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s;
      opt.textContent = s;
      select.appendChild(opt);
    });
    document.getElementById("filtroSup").style.display = "flex";
    SUP_SELECIONADA = ""; // Todas
  }

  renderizarCards();
}

// ─── Troca de aba ─────────────────────────────────────────
function mudarTab(tab) {
  TAB_ATUAL = tab;
  document.getElementById("tabAnal").classList.toggle("active", tab === "analistas");
  document.getElementById("tabAux").classList.toggle("active",  tab === "auxiliares");
  renderizarCards();
}

// ─── Filtro supervisão (coord) ────────────────────────────
function filtrarSupervisao() {
  SUP_SELECIONADA = document.getElementById("selectSup").value;
  renderizarCards();
}

// ─── Renderiza os cards ───────────────────────────────────
function renderizarCards() {
  const grid = document.getElementById("gridCards");
  grid.innerHTML = "";

  let colaboradores = [];

  const isCoord = CARGO_USUARIO === "Leticia Caroline Da Silva";

  if (isCoord && DADOS_COMPLETOS.supervisores) {
    const sups = DADOS_COMPLETOS.supervisores;
    const keys = SUP_SELECIONADA ? [SUP_SELECIONADA] : Object.keys(sups);
    keys.forEach(sup => {
      const grupo = sups[sup]?.[TAB_ATUAL] || [];
      grupo.forEach(c => { c._supervisao = sup; });
      colaboradores = colaboradores.concat(grupo);
    });
  } else {
    colaboradores = DADOS_COMPLETOS?.[TAB_ATUAL] || [];
    colaboradores.forEach(c => { c._supervisao = DADOS_COMPLETOS.supervisao || ""; });
  }

  if (!colaboradores.length) {
    grid.innerHTML = '<p style="color:white; font-weight:700; font-size:16px; padding:40px 0;">Nenhum colaborador encontrado.</p>';
    return;
  }

  // Ordena: piora primeiro, depois instável, estável, melhora
  const ordemTend = { piora: 0, instavel: 1, neutro: 2, estavel: 3, melhora: 4, sem_dados: 5 };
  colaboradores.sort((a, b) => (ordemTend[a.tendencia] ?? 5) - (ordemTend[b.tendencia] ?? 5));

  colaboradores.forEach(c => {
    grid.appendChild(criarCard(c));
  });
}

// ─── Cria card individual ─────────────────────────────────
function criarCard(c) {
  const div = document.createElement("div");
  div.className = `colab-card ${c.tendencia || "neutro"}`;

  const h = c.historico || {};
  const m2    = h.m2    || "";
  const m1    = h.m1    || "";
  const atual = h.atual || "";

  const badgeInfo = {
    melhora:  { icon: "📈", text: "Em Melhora",   cls: "melhora"  },
    estavel:  { icon: "➡️",  text: "Estável",      cls: "estavel"  },
    instavel: { icon: "⚠️", text: "Instável",     cls: "instavel" },
    piora:    { icon: "📉", text: "Atenção: Desvio", cls: "piora" },
    neutro:   { icon: "—",  text: "Sem histórico", cls: "neutro"  },
    sem_dados:{ icon: "—",  text: "Sem dados",     cls: "neutro"  },
  };
  const bi = badgeInfo[c.tendencia] || badgeInfo.neutro;

  // Meses dinâmicos: calcula nomes baseados na data atual
  const hoje = new Date();
  const nomeMes = (offset) => {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() + offset, 1);
    return d.toLocaleString("pt-BR", { month: "short" }).replace(".","").toUpperCase();
  };
  const mesM2    = nomeMes(-2);
  const mesM1    = nomeMes(-1);
  const mesAtual = nomeMes(0);

  div.innerHTML = `
    <div class="card-header">
      <div class="card-nome">${c.nome}</div>
      <div class="card-cargo">${TAB_ATUAL === "analistas" ? "Analista" : "Auxiliar"}</div>
    </div>
    <div class="badge-desvio ${bi.cls}">${bi.icon} ${bi.text}</div>
    <div class="timeline">
      ${buildStep(m2, mesM2)}
      ${buildStep(m1, mesM1)}
      ${buildStep(atual, mesAtual, true)}
    </div>
  `;

  return div;
}

function buildStep(nivel, mes, isAtual = false) {
  const cls = nivelClass(nivel);
  const label = nivel ? nivelAbrev(nivel) : "–";
  const border = isAtual ? 'box-shadow:0 0 0 3px #0e76d1;' : '';
  return `
    <div class="tl-step">
      <div class="tl-dot ${cls}" style="${border}" title="${nivel || 'Sem dado'}">${label}</div>
      <div class="tl-label">${nivel ? nivelShort(nivel) : "—"}</div>
      <div class="tl-mes">${mes}</div>
    </div>
  `;
}

function nivelClass(n) {
  if (!n) return "dot-vazio";
  const u = n.toUpperCase();
  if (u.includes("SUPER"))  return "dot-super";
  if (u.includes("DEFIN"))  return "dot-defin";
  if (u.includes("TOLER"))  return "dot-toler";
  if (u.includes("NÃO") || u.includes("NAO")) return "dot-nao";
  return "dot-vazio";
}

function nivelAbrev(n) {
  if (!n) return "–";
  const u = n.toUpperCase();
  if (u.includes("SUPER"))  return "SUP";
  if (u.includes("DEFIN"))  return "DEF";
  if (u.includes("TOLER"))  return "TOL";
  if (u.includes("NÃO") || u.includes("NAO")) return "NÃO";
  return "–";
}

function nivelShort(n) {
  if (!n) return "–";
  const u = n.toUpperCase();
  if (u.includes("SUPER"))  return "Superação";
  if (u.includes("DEFIN"))  return "Definida";
  if (u.includes("TOLER"))  return "Tolerável";
  if (u.includes("NÃO") || u.includes("NAO")) return "Não Atingiu";
  return n;
}

function setStatus(msg) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}
</script>
</body>
</html>
